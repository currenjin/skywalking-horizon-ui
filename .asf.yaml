github:
  description: Apache SkyWalking next-generation UI (Horizon)
  homepage: https://skywalking.apache.org/
  labels:
    - skywalking
    - observability
    - apm
    - ui
    - vue
    - dashboard
    - tracing
    - metrics
    - logging
    - topology
  enabled_merge_buttons:
    squash:  true
    merge:   false
    rebase:  false
  dependabot_updates: false
  protected_branches:
    main:
      required_status_checks:
        # Require branches to be up to date with main before merging.
        strict: true
        # The CI "required" job rolls up every check (license-header,
        # dependency-license, type-check, build-ui, build-bff, test) into a
        # single "Required" status, so protection gates on one context.
        contexts:
          - Required
      required_pull_request_reviews:
        required_approving_review_count: 1
        # Drop stale approvals when a PR gets new commits, so a reviewer's
        # LGTM doesn't carry over to code they haven't seen.
        dismiss_stale_reviews: true
