# Static local-boot config for previewing the "OAP query host is
# unreachable" landing block. Points queryUrl + adminUrl at a port
# nothing is listening on (127.0.0.1:12801 — adjacent to the normal
# local OAP 12800), so every OAP request fails fast with ECONNREFUSED.
# Auth + RBAC mirror horizon.local.yaml so admin/admin still logs in.

server:
  host: 127.0.0.1
  port: 8081

oap:
  queryUrl: http://127.0.0.1:12801
  adminUrl: http://127.0.0.1:12801
  zipkinUrl: http://127.0.0.1:9412/zipkin
  timeoutMs: 5000

auth:
  backend: local
  local:
    users:
      - username: viewer
        passwordHash: "$argon2id$v=19$m=65536,t=3,p=4$Gp175hqr+EF2iZ7v1fndvw$w6w9hDI59/UA+CRARChDoGRlR1TkVt6kqzApa021K+0"
        roles: [viewer]
      - username: maintainer
        passwordHash: "$argon2id$v=19$m=65536,t=3,p=4$w7ULwB3/jzH9FxVoHJ238A$y+qGoX6IPeOoGywLQCpfpAN5VJXcaevoWeJQhaybvQU"
        roles: [maintainer]
      - username: operator
        passwordHash: "$argon2id$v=19$m=65536,t=3,p=4$nzoI4RqiobprtzX/mJqe5Q$FY2Hi7mKep0DPHoaE++r/KD++WLUwTgRUFLde87j2Wg"
        roles: [operator]
      - username: admin
        passwordHash: "$argon2id$v=19$m=65536,t=3,p=4$joV9AVlyLS3pqq4mLrYokQ$pJLkTKrz9/LzEH6YaFljdz9k8dyBiryjwSB26Diiz9U"
        roles: [admin]

rbac:
  enabled: true
  roles:
    viewer:
      - "metrics:read"
      - "alarms:read"
      - "traces:read"
      - "logs:read"
      - "topology:read"
      - "profile:read"
      - "overview:read"
    maintainer:
      - "metrics:read"
      - "alarms:read"
      - "traces:read"
      - "logs:read"
      - "topology:read"
      - "profile:read"
      - "overview:read"
      - "cluster:read"
      - "inspect:read"
      - "ttl:read"
      - "config:read"
    operator:
      - "metrics:read"
      - "alarms:read"
      - "traces:read"
      - "logs:read"
      - "topology:read"
      - "profile:read"
      - "cluster:read"
      - "inspect:read"
      - "ttl:read"
      - "config:read"
      - "overview:read"
      - "overview:write"
      - "setup:read"
      - "setup:write"
      - "dashboard:read"
      - "dashboard:write"
      - "alarm-setup:read"
      - "alarm-setup:write"
      - "alarm-rule:read"
      - "alarm-rule:write"
      - "rule:read"
      - "rule:write"
      - "rule:write:structural"
      - "rule:delete"
      - "rule:debug"
      - "live-debug:read"
      - "live-debug:write"
      - "profile:enable"
    admin:
      - "*"
  landingByRole:
    viewer: /
    maintainer: /operate/cluster
    operator: /
    admin: /

session:
  ttlMinutes: 60
  cookieName: horizon_sid
  cookieSecure: false

audit:    { file: ./horizon-audit.jsonl }
setup:    { file: ./horizon-setup.json }
alarms:   { file: ./horizon-alarms.json }
debugLog: { enabled: false, file: ./horizon-wire.jsonl, maxBodyChars: 8192, redactAuthHeaders: true }
