name: CI

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  license-header:
    name: License header
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - name: Check license header
        uses: apache/skywalking-eyes@5b7ee1731d036b5aac68f8bd3fc9e6f98ada082e

  # NOTE: `license-eye dependency resolve` is deferred to a release-only
  # workflow. The tool invokes `npm ci` internally, which fails on pnpm
  # workspaces (no package-lock.json). When we cut an Apache release we'll
  # add a separate job that runs the resolver against a one-shot npm install
  # of the production dep graph. For day-to-day CI, header-check is enough.

  type-check:
    name: Type-check (workspaces)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm -r run type-check

  build-ui:
    name: Build · @skywalking-horizon-ui/ui
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @skywalking-horizon-ui/ui build

  build-bff:
    name: Build · @skywalking-horizon-ui/bff
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @skywalking-horizon-ui/bff build

  test:
    name: Unit tests (workspaces)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      # `pnpm -r` walks every workspace package and runs `test:unit` —
      # currently @skywalking-horizon-ui/ui (vitest + jsdom) and
      # @skywalking-horizon-ui/bff (vitest, node env). Packages without
      # the script (api-client, design-tokens) are skipped automatically.
      # The scripts already include `vitest run`, so no `--run` forwarding
      # needed — keeps the CI line robust against pnpm-flag parsing quirks.
      - run: pnpm -r run test:unit

  required:
    # Status-check name pinned to "Required" so Apache branch protection
    # (`.asf.yaml: protected_branches.main.required_status_checks.contexts:
    # [Required]`) can gate on a single rolled-up signal.
    if: always() && !cancelled()
    name: Required
    needs: [license-header, type-check, build-ui, build-bff, test]
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check upstream jobs
        run: |
          [[ ${{ needs.license-header.result }} == 'success' ]] || exit 1
          [[ ${{ needs.type-check.result }} == 'success' ]] || exit 1
          [[ ${{ needs.build-ui.result }} == 'success' ]] || exit 1
          [[ ${{ needs.build-bff.result }} == 'success' ]] || exit 1
          [[ ${{ needs.test.result }} == 'success' ]] || exit 1
