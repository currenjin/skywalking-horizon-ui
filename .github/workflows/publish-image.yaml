#
# Publish a Horizon UI container image to GHCR on:
#   - push to `main`  (tagged with `main` + the full commit SHA)
#   - any `v*` tag    (tagged with the version + the full commit SHA)
#
# The full commit SHA is the canonical, immutable identifier — moving tags
# like `main` and `vX.Y.Z` are conveniences that *also* point at the same
# SHA-pinned image. Operators should pull by SHA in production.
name: Publish image

on:
  push:
    branches:
      - main
    tags:
      - 'v*'

permissions:
  contents: read
  packages: write

concurrency:
  group: publish-image-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    name: Build + push (${{ github.ref_type }} ${{ github.ref_name }})
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # The canonical tag is the full 40-char commit SHA. We also publish
      # moving tags so common workflows ("pull :main", "pull :v1.2.3")
      # work — they all resolve back to the same SHA-tagged image.
      - name: Compute image tags
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=long,prefix=
            type=ref,event=branch,enable=${{ github.ref == 'refs/heads/main' }}
            type=semver,pattern={{version}},enable=${{ github.ref_type == 'tag' }}
            type=semver,pattern={{major}}.{{minor}},enable=${{ github.ref_type == 'tag' }}
            type=raw,value=latest,enable=${{ github.ref_type == 'tag' }}
          labels: |
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.title=Apache SkyWalking Horizon UI
            org.opencontainers.image.description=Next-generation web UI for Apache SkyWalking.
            org.opencontainers.image.licenses=Apache-2.0

      - name: Build + push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Image SHA tag (canonical)
        run: |
          echo "::notice::Published ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}@sha=${{ github.sha }}"
          echo "All published tags:"
          echo '${{ steps.meta.outputs.tags }}'
