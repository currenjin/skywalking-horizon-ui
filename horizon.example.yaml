# Copy this file to `horizon.yaml` and edit. Hot-reload picks up changes.

server:
  host: 127.0.0.1
  port: 8081

oap:
  # OAP admin host (port 17128 by default; runtime-rule / dsl-debugging / inspect / status live here).
  adminUrls:
    - http://127.0.0.1:17128
  # OAP query/status host (port 12800 by default; GraphQL + /status/*).
  statusUrl: http://127.0.0.1:12800
  timeoutMs: 15000

auth:
  backend: local
  local:
    users: []
    # Example user (generate the argon2 hash with `pnpm --filter bff cli:hash`):
    # - username: admin
    #   passwordHash: "$argon2id$v=19$..."
    #   roles: [admin]

rbac:
  enabled: false
  roles:
    viewer: ["*:read"]
    editor: ["*:read", "rule:write", "rule:debug", "inspect:read"]
    admin: ["*"]

session:
  ttlMinutes: 60
  cookieName: horizon_sid
  cookieSecure: false

audit:
  file: ./horizon-audit.jsonl

debugLog:
  enabled: false
  file: ./horizon-wire.jsonl
  maxBodyChars: 8192
  redactAuthHeaders: true
